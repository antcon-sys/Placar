<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Roboto", sans-serif;
            /* font-family: 'Arial Black', sans-serif; */
            background: transparent;
            color: white;
            overflow: hidden;
            margin: 0 auto;
        }

        .placar-container {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 12px;
            width: fit-content;
            padding: 5px;
            margin: 70px 0 0 60px;
            border-bottom: 5px solid #E65100;
            border-right: 5px solid #E65100;
        }

        .time-nome {
            padding: 0 15px;
            font-size: 20px;
            text-transform: uppercase;
        }

        .gols {
            background: #000;
            font-size: 28px;
            padding: 0 12px;
            color: #f1c40f;
        }

        .tempo-box {
            padding: 0 15px;
            font-size: 20px;
            border-left: 1px solid #444;
            min-width: 70px;
            text-align: center;
        }

        #acrescimo {
            color: #ff4757;
            font-size: 21px;
            margin-left: 7px;
            display: none;
        }

        #tempo {
            font-size: 20px;
            margin-right: 10px;
        }
    </style>
</head>

<body>

    <div class="placar-container">
        <div id="timeA" class="time-nome">CASA</div>
        <div id="golsA" class="gols">0</div>
        <div style="width:2px; background:#444; height:30px;"></div>
        <div id="golsB" class="gols">0</div>
        <div id="timeB" class="time-nome">VISITANTE</div>
        <div class="tempo-box">
            <span id="tempo">1T</span><span id="periodo">00:00</span><span id="acrescimo">+0</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // --- USE A MESMA CONFIGURAÇÃO AQUI ---
        const firebaseConfig = {
            apiKey: "AIzaSyCHKTA-mgIuWcVypfDkGrNhxtsynrUtq1Y",
            authDomain: "placar-live-53cc0.firebaseapp.com",
            projectId: "placar-live-53cc0",
            databaseURL: "https://placar-live-53cc0-default-rtdb.firebaseio.com",
            storageBucket: "placar-live-53cc0.firebasestorage.app",
            messagingSenderId: "291622264576",
            appId: "1:291622264576:web:1ca81d1333e4b0cb7b1de5",
            measurementId: "G-ZJPHJ42ECV"
            /*apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            databaseURL: "https://SEU_PROJETO.firebaseio.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "ID",
            appId: "ID"*/
        };
        // ------------------------------------

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('placar').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('timeA').innerText = data.timeA || "CASA";
                document.getElementById('golsA').innerText = data.golsA || 0;
                document.getElementById('timeB').innerText = data.timeB || "VISITANTE";
                document.getElementById('golsB').innerText = data.golsB || 0;
                document.getElementById('tempo').innerText = data.tempo || "1T";

                const s = data.segundos || 0;
                const min = Math.floor(s / 60).toString().padStart(2, '0');
                const seg = (s % 60).toString().padStart(2, '0');
                document.getElementById('periodo').innerText = min + ":" + seg;

                const acrescimoEl = document.getElementById('acrescimo');
                if (data.mostrarAcrescimo && data.minutosAcrescimo > 0) {
                    acrescimoEl.style.display = "inline";
                    acrescimoEl.innerText = "+" + data.minutosAcrescimo;
                } else {
                    acrescimoEl.style.display = "none";
                }
            }
        });
    </script>
</body>

</html>
